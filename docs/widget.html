<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Terrain Print Tool</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script src="selection.js"></script>
  <script src="hillshade.js"></script>
  <script src="search.js"></script>
  <script src="coverage.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
    #map { width: 100%; height: 100%; }
    #map-hillshade {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 4;
    }

    #controls {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    #search-row { display: flex; gap: 6px; }
    #search-input {
      width: 260px;
      padding: 7px 10px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      padding: 7px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      background: #fff;
      color: #333;
    }
    button:hover { background: #eee; }
    #size-buttons { display: flex; gap: 6px; }
    .size-btn.active { background: #0078ff; color: #fff; }
    #confirm-btn { background: #22c55e; color: #fff; font-weight: bold; }
    #confirm-btn:hover { background: #16a34a; }

    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(30, 255, 30, 0.85);
      background: transparent;
      pointer-events: none;
      z-index: 5;
    }
    #overlay-label {
      position: absolute;
      bottom: +12px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: rgba(20, 20, 20, 0.9);
    }

    /* Red overlay state when chosen resolution has no coverage at current location */
    #overlay.overlay-invalid {
      border-color: rgba(255, 50, 50, 0.9);
    }
    #overlay-invalid-fill {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 0, 0, 0.18);
      pointer-events: none;
      display: none;
    }
    #overlay.overlay-invalid #overlay-invalid-fill {
      display: block;
    }
    #coverage-message {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: rgba(200, 0, 0, 0.95);
      font-size: 12px;
      font-weight: bold;
      display: none;
      pointer-events: none;
    }

    #summary {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.8;
      display: none;
      z-index: 10;
      text-align: center;
      white-space: nowrap;
    }
    #summary-actions { margin-top: 8px; display: flex; gap: 8px; justify-content: center; }
    #summary-confirm-btn { background: #22c55e; color: #fff; font-weight: bold; }
    #summary-confirm-btn:hover { background: #16a34a; }
    #summary-cancel-btn { background: #fff; color: #333; }
    button:disabled { background: #ccc !important; color: #999 !important; cursor: default; }
    #search-input:disabled { background: #e8e8e8; color: #999; }
    #search-wrapper { position: relative; }
    #search-suggestions {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 20;
    }
    .suggestion-item {
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .suggestion-item:hover { background: #f0f0f0; }
    #attribution {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: rgba(0, 0, 0, 0.5);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="map-hillshade"></div>
<div id="overlay">
  <div id="overlay-invalid-fill"></div>
  <div id="overlay-label">Relief is for preview only, print quality will exceed this</div>
  <div id="coverage-message"></div>
</div>

<div id="controls">
  <div id="search-wrapper">
    <div id="search-row">
      <input id="search-input" type="text" placeholder="Search location…" />
      <button id="search-btn">Search</button>
    </div>
    <div id="search-suggestions"></div>
  </div>
  <div id="size-buttons">
    <button class="size-btn" data-km="5">5 km</button>
    <button class="size-btn" data-km="10">10 km</button>
    <button class="size-btn" data-km="25">25 km</button>
    <button class="size-btn active" data-km="50">50 km</button>
    <button class="size-btn" data-km="100">100 km</button>
  </div>
  <button id="confirm-btn">Select</button>
</div>

<div id="summary"></div>
<div id="attribution">Elevation data: Copernicus GLO-30</div>

<script>
  const MAPBOX_TOKEN = 'pk.eyJ1Ijoic2VidmhlIiwiYSI6ImNtbmZzMTB1eDAyMjUycXIwZHg0dHZ1eWwifQ.q3NMm1sXT6zxnLSasRoarQ';

  mapboxgl.accessToken = MAPBOX_TOKEN;

  let area_km = 50;
  let exploreMode = false;
  let isProgrammaticMove = false;

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/outdoors-v12',
    center: [18.0727, 59.321],
    zoom: 9,
    dragRotate: false,
    touchPitch: false
  });

  const overlay = document.getElementById('overlay');
  const summary = document.getElementById('summary');

  // ── Overlay sizing ──────────────────────────────────────────────────────────

  function metersPerPixel(lat, zoom) {
    return (78271.51696 * Math.cos(lat * Math.PI / 180)) / Math.pow(2, zoom);
  }

  function updateOverlay() {
    const mpp = metersPerPixel(map.getCenter().lat, map.getZoom());
    const px = (area_km * 1000) / mpp;
    overlay.style.width  = px + 'px';
    overlay.style.height = px + 'px';
    const label = document.getElementById('overlay-label');
    if (px < 260) {
      label.style.visibility = 'hidden';
    } else {
      label.style.visibility = 'visible';
      label.style.fontSize = '11px';
    }
  }

  // Returns zoom level where the selection square fills ~65% of shortest viewport dim
  function zoomFor65Pct(lat) {
    const minDim = Math.min(map.getCanvas().clientWidth, map.getCanvas().clientHeight);
    const targetPx = 0.65 * minDim;
    // targetPx = area_km*1000 / mpp  =>  2^zoom = 156543*cos(lat)*targetPx / (area_km*1000)
    return Math.log2(78271.51696 * Math.cos(lat * Math.PI / 180) * targetPx / (area_km * 1000));
  }

  function autoZoom() {
    const z = zoomFor65Pct(map.getCenter().lat);
    isProgrammaticMove = true;
    map.flyTo({ zoom: z });
    map.once('moveend', () => { isProgrammaticMove = false; });
  }

  // ── Map events ──────────────────────────────────────────────────────────────

  map.on('load', () => {
    isProgrammaticMove = true;
    map.jumpTo({ zoom: zoomFor65Pct(map.getCenter().lat) });
    map.once('moveend', () => { isProgrammaticMove = false; });
    map.touchZoomRotate.disableRotation();
    updateOverlay();
  });
  map.on('move',  updateOverlay);

  map.on('zoom', () => {
    if (!isProgrammaticMove) exploreMode = true;
  });

  map.on('dragstart', () => {
    if (!isProgrammaticMove) exploreMode = true;
  });

  // ── Area size buttons ───────────────────────────────────────────────────────

  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      area_km = parseInt(btn.dataset.km, 10);
      updateOverlay();
      autoZoom();
      if (window.onSizeChanged) window.onSizeChanged(map, ['5', '10']);
    });
  });

  // ── Address search ──────────────────────────────────────────────────────────

  initSearch(map, MAPBOX_TOKEN, zoomFor65Pct,
    () => { isProgrammaticMove = true; },
    () => { isProgrammaticMove = false; exploreMode = false; updateOverlay(); }
  );

  // ── Haversine destination ───────────────────────────────────────────────────

  function haversineDest(lat, lon, bearing_deg, dist_km) {
    const R  = 6371;
    const d  = dist_km / R;
    const φ1 = lat * Math.PI / 180;
    const λ1 = lon * Math.PI / 180;
    const θ  = bearing_deg * Math.PI / 180;
    const φ2 = Math.asin(Math.sin(φ1) * Math.cos(d) +
                         Math.cos(φ1) * Math.sin(d) * Math.cos(θ));
    const λ2 = λ1 + Math.atan2(Math.sin(θ) * Math.sin(d) * Math.cos(φ1),
                                Math.cos(d) - Math.sin(φ1) * Math.sin(φ2));
    return { lat: φ2 * 180 / Math.PI, lon: λ2 * 180 / Math.PI };
  }

  // ── Select / Confirm / Cancel ────────────────────────────────────────────────

  initSelection(map, () => area_km, haversineDest, summary);
  initHillshade(map, overlay);
  initCoverage(map, ['5', '10']);
</script>

</body>
</html>
